site_name: AgentAuth
site_description: Layered identity composition for AI agents
site_url: https://plexusone.github.io/agentauth/
repo_url: https://github.com/plexusone/agentauth
repo_name: plexusone/agentauth

theme:
  name: material
  palette:
    # Dark mode first
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

extra_css:
  - https://aistandards.io/css/aistandardsio-mkdocs.css

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - def_list
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - AgentAuth:
    - Overview: agentauth/overview.md
    - Getting Started: agentauth/getting-started.md
    - Deployment: agentauth/deployment.md
    - Integration: agentauth/integration.md
    - API Reference: agentauth/api-reference.md
  - Identity:
    - Layered Identity: identity/overview.md
  - Storage:
    - Overview: storage/overview.md
  - Releases:
    - v0.1.0: releases/v0.1.0.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/plexusone/agentauth

plugins:
  - search
